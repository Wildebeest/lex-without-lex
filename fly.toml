app = "lex-without-lex"
primary_region = "iad"
kill_signal = "SIGINT"
kill_timeout = 300

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1

[mounts]
  source = "data"
  destination = "/app/data"

[env]
  LWL_DATA_DIR = "/app/data"
